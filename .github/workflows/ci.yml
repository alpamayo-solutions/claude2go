name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    name: "Test & lint (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      # sounddevice loads the PortAudio C library at import time;
      # tests import claude_to_go.audio, so the runner needs it.
      - name: Install PortAudio (needed by sounddevice at import time)
        run: sudo apt-get update && sudo apt-get install -y libportaudio2

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest -q

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Security scan (bandit)
        run: uv run bandit -c pyproject.toml -r src/ -q
